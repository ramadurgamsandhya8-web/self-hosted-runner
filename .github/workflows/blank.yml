name: Self Hosted Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Runner Machine
        run: hostname

      - name: Print Message
        run: echo "Self Hosted Runner Working Successfully"

      - name: Show Current Folder
        run: pwd

      - name: System Info
        run: |
          hostname
          whoami
          ipconfig

      - name: Docker Version
        run: docker version

      - name: Build Docker Image
        run: docker build -t self-hosted-app .

      - name: Show Docker Images
        run: docker images

      - name: Stop Old Container
        shell: powershell
        run: |
          docker rm -f self-hosted-container
          exit 0

      - name: Run New Container
        run: docker run -d -p 8082:80 --name self-hosted-container self-hosted-app

      - name: Show Running Containers
        run: docker ps

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Image
        run: docker tag self-hosted-app ${{ secrets.DOCKER_USERNAME }}/self-hosted-app:latest

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/self-hosted-app:latest